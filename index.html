<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pokémon Viewer</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>

<header>
  <h1>Pokémon Viewer</h1>
</header>

<div class="tabs">
  <button class="tab-button active" data-tab="list" onclick="switchTab('list')">List</button>
  <button class="tab-button" data-tab="other" onclick="switchTab('other')">Other</button>
</div>

<div id="list" class="tab-content show">
  <div id="pokemon-list">
    <!-- Pokémon names -->
    <div class="pokemon-name" onclick="openPopup()">Pikachu</div>
    <div class="pokemon-name" onclick="openPopup()">Charmander</div>
    <div class="pokemon-name" onclick="openPopup()">Bulbasaur</div>
  </div>
</div>

<div id="other" class="tab-content">
  <p>This is another tab content.</p>
</div>

<!-- Modal for Pokémon sprites -->
<div id="spritesModal">
  <div class="modal-content">
    <button onclick="closePopup()" style="margin-bottom:10px;">Close</button>
    <h2 id="pokemonName"></h2>
    <div id="popupSprites"></div>
    <div id="popupShinySprites" style="margin-top:10px;"></div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
