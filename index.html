<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Pokémon Hub</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Pokémon Hub</h1>
  </header>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-button active" data-tab="challenges">Challenges</button>
    <button class="tab-button" data-tab="pokemon">Pokémon</button>
    <button class="tab-button" data-tab="sandwiches">Sandwiches</button>
    <button class="tab-button" data-tab="typechart">Type Chart</button>
  </div>

  <!-- Challenges tab -->
  <div class="tab-content" id="challenges" style="display: block;">
    <h2>Challenges</h2>
    <p>Placeholder for challenges.</p>
  </div>

  <!-- Pokémon tab: only list, search -->
  <div class="tab-content" id="pokemon">
    <h2>Pokémon</h2>
    <!-- Search bar -->
    <input type="text" id="searchInput" placeholder="Search Pokémon..." />

    <!-- Pokémon list -->
    <div id="pokemon-list" style="margin-top:20px; display:flex; flex-wrap:wrap; gap:10px;"></div>
  </div>

  <!-- Sandwiches tab -->
  <div class="tab-content" id="sandwiches">
    <h2>Sandwiches</h2>
    <p>Placeholder content.</p>
  </div>

  <!-- Type chart tab -->
  <div class="tab-content" id="typechart">
    <h2>Type Chart</h2>
    <p>Placeholder content.</p>
  </div>

  <!-- Sprite popup modal (sprites only inside here) -->
  <div id="spritesModal" class="modal">
    <div class="modal-content">
      <span class="close" id="closeModal">&times;</span>
      <h2 id="pokemonName" style="text-align:center; margin-bottom:20px; color:#fff;"></h2>
      <div style="display:flex; gap:20px;">
        <div style="flex:1;">
          <div id="popupSprites"></div>
        </div>
        <div style="flex:1;">
          <div id="popupShinySprites"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
