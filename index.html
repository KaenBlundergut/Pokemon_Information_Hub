<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pokemon Information Hub</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Pokemon Information Hub</h1>
    <div class="header-buttons">
      <button class="small-button" id="aboutBtn">About</button>
      <button class="small-button" id="feedbackBtn">Feedback</button>
      <button class="small-button" id="donateBtn">Donate</button>
    </div>
  </header>

  <nav>
    <button class="main-button" data-tab="challenges">Challenges</button>
    <button class="main-button" data-tab="pokedex">Pokedex</button>
    <button class="main-button" data-tab="sandwich">Sandwich</button>
    <button class="main-button" data-tab="typechart">Type Chart</button>
  </nav>

  <main>
    <section id="challenges" class="tab-content"></section>
    <section id="pokedex" class="tab-content hidden">
      <div class="pokedex-container" id="pokemonList"></div>
    </section>
    <section id="sandwich" class="tab-content"></section>
    <section id="typechart" class="tab-content"></section>
  </main>

  <!-- Popup for Pokémon details -->
  <div id="popup" class="popup hidden">
    <div class="popup-content">
      <span class="close-btn" id="closePopup">&times;</span>
      <h2 id="pokemonName"></h2>
      <div class="sprites-container">
        <img id="sprite" src="" alt="Sprite" />
        <img id="shinySprite" src="" alt="Shiny Sprite" />
      </div>
    </div>
  </div>

<script src="script.js"></script>
</body>
</html>
