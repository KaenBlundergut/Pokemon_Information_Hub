<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Pokémon Sprites Gallery</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Header with a golden parallelogram -->
  <header>
    <h1>Pokémon Information Hub</h1>
  </header>

  <!-- Tabs navigation -->
  <div class="tabs">
    <button class="tab-button active" data-tab="challenges">Challenges</button>
    <button class="tab-button" data-tab="pokemon">Pokémon</button>
    <button class="tab-button" data-tab="sandwiches">Sandwiches</button>
    <button class="tab-button" data-tab="typechart">Type Chart</button>
  </div>

  <!-- Challenges Section -->
  <div class="tab-content" id="challenges" style="display: block;">
    <h2>Challenges</h2>
    <p>Here you can describe challenges or leave it as a placeholder.</p>
  </div>

  <!-- Pokémon Section with Search and Sprites Gallery -->
  <div class="tab-content" id="pokemon">
    <h2>Pokémon</h2>
    <!-- Search Box -->
    <input type="text" id="searchInput" placeholder="Search Pokémon..." />

    <!-- Container for sprite sections side by side -->
    <div class="sprite-sections">
      <!-- Regular Sprites Box -->
      <div class="sprite-box">
        <h3 style="text-align:center;">Sprites</h3>
        <div id="sprites-gallery" class="sprites-grid"></div>
      </div>
      <!-- Shiny Sprites Box -->
      <div class="sprite-box">
        <h3 style="text-align:center;">Shiny Sprites</h3>
        <div id="shiny-sprites-gallery" class="sprites-grid"></div>
      </div>
    </div>
  </div>

  <!-- Sandwiches Section -->
  <div class="tab-content" id="sandwiches">
    <h2>Sandwiches</h2>
    <p>Content about sandwiches or placeholders.</p>
  </div>

  <!-- Type Chart Section -->
  <div class="tab-content" id="typechart">
    <h2>Type Chart</h2>
    <p>Content about Pokémon types or placeholders.</p>
  </div>

  <!-- Modal for sprites popup -->
  <div id="spritesModal" class="modal">
    <div class="modal-content">
      <span class="close-button" id="closeModal">&times;</span>
      <h2 id="pokemonName" style="text-align:center; margin-bottom: 20px; color:#fff;"></h2>
      <div class="popup-sprites">
        <div>
          <h3 style="color:#FFD700;">Sprites</h3>
          <div id="popupSprites" class="sprites-grid"></div>
        </div>
        <div>
          <h3 style="color:#FFD700;">Shiny Sprites</h3>
          <div id="popupShinySprites" class="sprites-grid"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
